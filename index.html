<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Portfolio | Loading…</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg-primary:    #0a0e1a;
      --bg-secondary:  #0f1526;
      --bg-card:       #141929;
      --bg-card-hover: #1a2035;
      --accent:        #00d4c8;
      --accent-2:      #0099ff;
      --grad:          linear-gradient(135deg, #00d4c8, #0099ff);
      --text:          #e8eaf6;
      --text-2:        #8892b0;
      --text-3:        #4a5568;
      --border:        #1e2a45;
      --border-2:      #243050;
    }
    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
    html { scroll-behavior:smooth; }
    body { font-family:'Inter',sans-serif; background:var(--bg-primary); color:var(--text); line-height:1.6; overflow-x:hidden; }
    ::-webkit-scrollbar { width:5px; }
    ::-webkit-scrollbar-track { background:var(--bg-primary); }
    ::-webkit-scrollbar-thumb { background:var(--accent); border-radius:3px; }

    /* LOADER */
    #loader { position:fixed; inset:0; z-index:9999; background:var(--bg-primary); display:flex; flex-direction:column; align-items:center; justify-content:center; gap:1.5rem; transition:opacity .4s,visibility .4s; }
    #loader.hidden { opacity:0; visibility:hidden; }
    .loader-logo { font-family:'JetBrains Mono',monospace; font-size:2.5rem; font-weight:700; background:var(--grad); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; animation:pulse-logo 1.5s ease-in-out infinite; }
    @keyframes pulse-logo { 0%,100%{opacity:1} 50%{opacity:.4} }
    .loader-track { width:180px; height:3px; background:var(--border); border-radius:2px; overflow:hidden; }
    .loader-bar { height:100%; width:30%; background:var(--grad); border-radius:2px; animation:slide 1.2s ease-in-out infinite; }
    @keyframes slide { 0%{transform:translateX(-100%)} 100%{transform:translateX(500%)} }

    /* NAV */
    #navbar { position:fixed; top:0; left:0; right:0; z-index:1000; height:64px; padding:0 2rem; display:flex; align-items:center; justify-content:space-between; background:rgba(10,14,26,.85); backdrop-filter:blur(14px); border-bottom:1px solid var(--border); }
    .nav-logo { font-family:'JetBrains Mono',monospace; font-size:1.2rem; font-weight:700; background:var(--grad); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; cursor:default; }
    .nav-links { display:flex; gap:2rem; list-style:none; }
    .nav-links a { color:var(--text-2); text-decoration:none; font-size:.875rem; font-weight:500; letter-spacing:.03em; transition:color .2s; }
    .nav-links a:hover,.nav-links a.active { color:var(--accent); }

    /* SECTIONS */
    section { padding:100px 2rem; }
    .container { max-width:1100px; margin:0 auto; }
    .s-label { font-family:'JetBrains Mono',monospace; font-size:.75rem; font-weight:700; color:var(--accent); letter-spacing:.15em; text-transform:uppercase; margin-bottom:.6rem; }
    .s-title { font-size:clamp(1.8rem,4vw,2.5rem); font-weight:700; letter-spacing:-.02em; margin-bottom:.75rem; }
    .s-divider { width:56px; height:3px; background:var(--grad); border-radius:2px; margin-bottom:3rem; }

    /* HERO */
    #about { min-height:100vh; display:flex; align-items:center; justify-content:center; position:relative; overflow:hidden; padding-top:64px; }
    .hero-bg { position:absolute; inset:0; pointer-events:none; background:radial-gradient(ellipse 80% 60% at 20% 40%,rgba(0,212,200,.06) 0%,transparent 60%),radial-gradient(ellipse 60% 50% at 80% 60%,rgba(0,153,255,.06) 0%,transparent 60%); }
    .hero-grid { position:absolute; inset:0; pointer-events:none; background-image:linear-gradient(var(--border) 1px,transparent 1px),linear-gradient(90deg,var(--border) 1px,transparent 1px); background-size:40px 40px; opacity:.25; }
    .hero-inner { position:relative; max-width:900px; text-align:center; padding:2rem 1rem; }
    .hero-badge { display:inline-flex; align-items:center; gap:8px; padding:5px 16px; margin-bottom:1.5rem; border:1px solid var(--accent); border-radius:100px; font-size:.78rem; color:var(--accent); font-family:'JetBrains Mono',monospace; letter-spacing:.06em; }
    .hero-badge::before { content:''; width:7px; height:7px; background:var(--accent); border-radius:50%; animation:blink 2s infinite; }
    @keyframes blink { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.4;transform:scale(1.4)} }
    .hero-name { font-size:clamp(2.8rem,6vw,5rem); font-weight:800; line-height:1.1; letter-spacing:-.025em; margin-bottom:.5rem; }
    .hero-name span { background:var(--grad); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; }
    .hero-sub { font-size:clamp(1rem,2.5vw,1.4rem); color:var(--text-2); margin-bottom:1.5rem; }
    .hero-summary { font-size:1rem; color:var(--text-2); line-height:1.8; max-width:680px; margin:0 auto 2.5rem; }
    .hero-stats { display:flex; justify-content:center; flex-wrap:wrap; gap:2.5rem; margin-bottom:2.5rem; }
    .stat-num { font-size:2rem; font-weight:800; font-family:'JetBrains Mono',monospace; background:var(--grad); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; }
    .stat-lbl { font-size:.75rem; color:var(--text-3); text-transform:uppercase; letter-spacing:.08em; margin-top:2px; }
    .hero-cta { display:flex; gap:1rem; justify-content:center; flex-wrap:wrap; }
    .btn-p { padding:12px 28px; border-radius:8px; background:var(--grad); color:#fff; font-weight:600; font-size:.9rem; text-decoration:none; transition:all .2s; box-shadow:0 0 20px rgba(0,212,200,.25); }
    .btn-p:hover { transform:translateY(-2px); box-shadow:0 0 32px rgba(0,212,200,.45); }
    .btn-s { padding:12px 28px; border-radius:8px; background:transparent; color:var(--text); font-weight:600; font-size:.9rem; text-decoration:none; border:1px solid var(--border-2); transition:all .2s; }
    .btn-s:hover { border-color:var(--accent); color:var(--accent); transform:translateY(-2px); }

    /* HIGHLIGHTS */
    .hl-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(250px,1fr)); gap:1.4rem; }
    .hl-card { background:var(--bg-card); border:1px solid var(--border); border-radius:12px; padding:1.75rem; text-align:center; transition:all .3s; }
    .hl-card:hover { border-color:var(--accent); transform:translateY(-4px); box-shadow:0 12px 30px rgba(0,212,200,.07); }
    .hl-icon { font-size:1.8rem; margin-bottom:.6rem; }
    .hl-val { font-size:1.9rem; font-weight:800; font-family:'JetBrains Mono',monospace; background:var(--grad); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; margin-bottom:.3rem; }
    .hl-lbl { font-size:.875rem; color:var(--text-2); line-height:1.5; }

    /* EXPERIENCE */
    .timeline { position:relative; padding-left:2rem; }
    .timeline::before { content:''; position:absolute; left:0; top:8px; bottom:8px; width:2px; background:linear-gradient(180deg,var(--accent),var(--accent-2),transparent); }
    .tl-item { position:relative; margin-bottom:2.5rem; }
    .tl-item::before { content:''; position:absolute; left:-2.42rem; top:8px; width:12px; height:12px; background:var(--accent); border-radius:50%; box-shadow:0 0 12px var(--accent); }
    .exp-card { background:var(--bg-card); border:1px solid var(--border); border-radius:12px; padding:1.6rem; transition:all .3s; }
    .exp-card:hover { background:var(--bg-card-hover); border-color:var(--accent); transform:translateX(4px); }
    .exp-head { display:flex; justify-content:space-between; align-items:flex-start; flex-wrap:wrap; gap:.6rem; margin-bottom:1rem; }
    .exp-title { font-size:1.1rem; font-weight:700; }
    .exp-co { font-size:.95rem; color:var(--accent); font-weight:600; margin-top:2px; }
    .exp-period { font-family:'JetBrains Mono',monospace; font-size:.78rem; color:var(--text-3); background:var(--bg-secondary); padding:3px 10px; border-radius:4px; border:1px solid var(--border); }
    .exp-loc { font-size:.78rem; color:var(--text-3); margin-top:4px; text-align:right; }
    .exp-bullets { list-style:none; }
    .exp-bullets li { position:relative; padding-left:1.2rem; color:var(--text-2); font-size:.875rem; line-height:1.7; margin-bottom:.45rem; }
    .exp-bullets li::before { content:'▸'; position:absolute; left:0; color:var(--accent); }

    /* PROJECTS */
    .proj-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(460px,1fr)); gap:1.75rem; }
    .proj-card { background:var(--bg-card); border:1px solid var(--border); border-radius:14px; overflow:hidden; display:flex; flex-direction:column; transition:all .3s; }
    .proj-card:hover { border-color:var(--accent); transform:translateY(-4px); box-shadow:0 16px 40px rgba(0,212,200,.07); }
    .proj-head { padding:1.4rem 1.6rem 1rem; background:linear-gradient(135deg,rgba(0,212,200,.04),rgba(0,153,255,.04)); border-bottom:1px solid var(--border); }
    .proj-top { display:flex; align-items:center; justify-content:space-between; gap:1rem; margin-bottom:.7rem; }
    .proj-name-row { display:flex; align-items:center; gap:9px; }
    .proj-icon { font-size:1.5rem; }
    .proj-name { font-size:1.05rem; font-weight:700; }
    .badge { display:inline-flex; align-items:center; gap:5px; padding:3px 10px; border-radius:100px; font-size:.72rem; font-weight:600; flex-shrink:0; }
    .badge-dot { width:6px; height:6px; border-radius:50%; background:currentColor; }
    .badge-active { background:rgba(0,212,200,.1); color:var(--accent); border:1px solid rgba(0,212,200,.3); }
    .badge-wip { background:rgba(255,180,50,.1); color:#ffb432; border:1px solid rgba(255,180,50,.3); }
    .badge-new { background:rgba(120,80,255,.1); color:#a78bfa; border:1px solid rgba(120,80,255,.3); }
    .proj-desc { font-size:.875rem; color:var(--text-2); line-height:1.7; }
    .proj-meta { display:flex; gap:1rem; margin-top:.7rem; font-size:.78rem; color:var(--text-3); font-family:'JetBrains Mono',monospace; }
    .proj-body { padding:1.2rem 1.6rem; flex:1; }
    .proj-section-title { font-size:.7rem; font-weight:700; color:var(--text-3); text-transform:uppercase; letter-spacing:.1em; margin-bottom:.5rem; }
    .proj-arch { background:var(--bg-secondary); border:1px solid var(--border); border-radius:8px; padding:.8rem 1rem; margin-bottom:1.1rem; }
    .arch-flow { display:flex; align-items:center; flex-wrap:wrap; gap:4px; }
    .arch-node { background:rgba(0,212,200,.08); border:1px solid rgba(0,212,200,.2); border-radius:4px; padding:2px 7px; font-size:.72rem; color:var(--text-2); font-family:'JetBrains Mono',monospace; }
    .arch-arrow { color:var(--accent); font-size:.85rem; }
    .proj-hl { list-style:none; margin-bottom:1.1rem; }
    .proj-hl li { position:relative; padding-left:1.2rem; font-size:.84rem; color:var(--text-2); line-height:1.6; margin-bottom:.35rem; }
    .proj-hl li::before { content:'✦'; position:absolute; left:0; color:var(--accent); font-size:.6rem; top:5px; }
    .proj-tags { display:flex; flex-wrap:wrap; gap:5px; }
    .tag { padding:3px 9px; background:rgba(0,153,255,.07); border:1px solid rgba(0,153,255,.2); border-radius:4px; font-size:.73rem; color:var(--text-2); font-family:'JetBrains Mono',monospace; }
    .tag-lang { background:rgba(0,212,200,.1); border-color:rgba(0,212,200,.25); color:var(--accent); }
    .proj-foot { padding:.9rem 1.6rem; border-top:1px solid var(--border); display:flex; align-items:center; justify-content:space-between; gap:.75rem; }
    .proj-links { display:flex; gap:.6rem; }
    .pl { display:inline-flex; align-items:center; gap:5px; padding:6px 13px; border-radius:6px; font-size:.8rem; font-weight:600; text-decoration:none; transition:all .2s; }
    .pl-primary { background:var(--grad); color:#fff; }
    .pl-primary:hover { box-shadow:0 4px 14px rgba(0,212,200,.35); transform:translateY(-1px); }
    .pl-ghost { background:transparent; color:var(--text-2); border:1px solid var(--border-2); }
    .pl-ghost:hover { color:var(--accent); border-color:var(--accent); }
    .proj-updated { font-size:.72rem; color:var(--text-3); font-family:'JetBrains Mono',monospace; }
    .wip-body { flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:2rem 1.6rem; gap:.6rem; text-align:center; }
    .wip-big { font-size:2.5rem; }
    .wip-lbl { font-size:.95rem; font-weight:600; color:var(--text-2); }
    .wip-sub { font-size:.83rem; color:var(--text-3); max-width:260px; line-height:1.6; }
    .proj-empty { grid-column:1/-1; text-align:center; padding:3rem; color:var(--text-3); font-size:.9rem; }

    /* SKILLS */
    .sk-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(290px,1fr)); gap:1.4rem; }
    .sk-card { background:var(--bg-card); border:1px solid var(--border); border-radius:12px; padding:1.4rem; transition:all .3s; }
    .sk-card:hover { border-color:var(--accent); background:var(--bg-card-hover); }
    .sk-head { display:flex; align-items:center; gap:9px; margin-bottom:.9rem; }
    .sk-ico { width:34px; height:34px; border-radius:8px; background:rgba(0,212,200,.1); display:flex; align-items:center; justify-content:center; font-size:1rem; }
    .sk-cat { font-size:.78rem; font-weight:700; color:var(--accent); text-transform:uppercase; letter-spacing:.06em; }
    .sk-tags { display:flex; flex-wrap:wrap; gap:5px; }
    .sk-tag { padding:3px 9px; background:rgba(0,212,200,.07); border:1px solid rgba(0,212,200,.18); border-radius:4px; font-size:.77rem; color:var(--text-2); font-family:'JetBrains Mono',monospace; transition:all .2s; }
    .sk-tag:hover { background:rgba(0,212,200,.14); color:var(--accent); }

    /* EDUCATION */
    .edu-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(400px,1fr)); gap:1.4rem; }
    .edu-card { background:var(--bg-card); border:1px solid var(--border); border-radius:12px; padding:1.6rem; display:flex; gap:1.2rem; align-items:flex-start; transition:all .3s; }
    .edu-card:hover { border-color:var(--accent); background:var(--bg-card-hover); }
    .edu-ico { width:46px; height:46px; border-radius:10px; flex-shrink:0; background:rgba(0,212,200,.1); display:flex; align-items:center; justify-content:center; font-size:1.4rem; }
    .edu-deg { font-size:1rem; font-weight:700; margin-bottom:2px; }
    .edu-field { font-size:.875rem; color:var(--accent); margin-bottom:2px; }
    .edu-school { font-size:.875rem; color:var(--text-2); }
    .edu-period { font-size:.77rem; color:var(--text-3); font-family:'JetBrains Mono',monospace; margin-top:6px; }

    /* CONTACT */
    .ct-wrap { max-width:560px; margin:0 auto; text-align:center; }
    .ct-intro { font-size:.95rem; color:var(--text-2); line-height:1.8; margin-bottom:2rem; }
    .ct-links { display:flex; flex-direction:column; gap:.9rem; align-items:center; }
    .ct-link { display:flex; align-items:center; gap:12px; padding:13px 24px; border-radius:10px; background:var(--bg-card); border:1px solid var(--border); text-decoration:none; color:var(--text); font-size:.9rem; transition:all .2s; width:100%; max-width:360px; }
    .ct-link:hover { border-color:var(--accent); color:var(--accent); background:var(--bg-card-hover); }
    .ct-icon { width:34px; height:34px; border-radius:8px; flex-shrink:0; background:rgba(0,212,200,.1); display:flex; align-items:center; justify-content:center; font-size:1rem; }

    /* FOOTER */
    footer { text-align:center; padding:2rem; color:var(--text-3); font-size:.82rem; border-top:1px solid var(--border); }
    footer span { color:var(--accent); }

    /* ANIMATIONS */
    .fade { opacity:0; transform:translateY(18px); transition:opacity .55s ease,transform .55s ease; }
    .fade.in { opacity:1; transform:translateY(0); }

    /* RESPONSIVE */
    @media(max-width:768px) {
      #navbar { padding:0 1rem; }
      .nav-links { display:none; }
      section { padding:70px 1.25rem; }
      .proj-grid { grid-template-columns:1fr; }
      .edu-grid { grid-template-columns:1fr; }
      .hero-stats { gap:1.5rem; }
    }
  </style>
</head>
<body>

<div id="loader">
  <div class="loader-logo">SRB</div>
  <div class="loader-track"><div class="loader-bar"></div></div>
</div>

<nav id="navbar">
  <div class="nav-logo" id="nav-logo">SRB</div>
  <ul class="nav-links" id="nav-links"></ul>
</nav>

<section id="about"></section>
<section id="highlights"></section>
<section id="experience"></section>
<section id="projects"></section>
<section id="skills"></section>
<section id="education"></section>
<section id="contact"></section>
<footer id="footer"></footer>

<script>
/* =====================================================
   PORTFOLIO ENGINE v2
   - Content: fetched from data.json (edit that, not this)
   - Projects: live from GitHub API (auto-synced)
   - Caches GitHub API in sessionStorage (10 min TTL)
===================================================== */

const GITHUB_API = 'https://api.github.com';
const CACHE_KEY  = 'srb_gh_repos';
const CACHE_TTL  = 10 * 60 * 1000;

const el  = id => document.getElementById(id);
const esc = s  => String(s||'').replace(/[&<>"']/g, c =>
  ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const fmt = d => d ? new Date(d).toLocaleDateString('en-US',{month:'short',year:'numeric'}) : '';

async function loadData() {
  const r = await fetch('./data.json?v=' + Date.now());
  if (!r.ok) throw new Error('Could not load data.json — make sure it exists in the repo root.');
  return r.json();
}

async function loadRepos(username) {
  try {
    const cached = sessionStorage.getItem(CACHE_KEY);
    if (cached) {
      const {ts, repos} = JSON.parse(cached);
      if (Date.now() - ts < CACHE_TTL) return repos;
    }
    const r = await fetch(`${GITHUB_API}/users/${username}/repos?sort=updated&per_page=50`);
    const repos = await r.json();
    if (Array.isArray(repos)) {
      sessionStorage.setItem(CACHE_KEY, JSON.stringify({ts: Date.now(), repos}));
      return repos;
    }
    return [];
  } catch { return []; }
}

/* ── NAV ── */
function renderNav(d) {
  el('nav-logo').textContent = d.personal.initials || 'Portfolio';
  const links = [['#about','About'],['#highlights','Impact'],['#experience','Experience'],
                 ['#projects','Projects'],['#skills','Skills'],['#education','Education'],['#contact','Contact']];
  el('nav-links').innerHTML = links.map(([h,l]) => `<li><a href="${h}">${l}</a></li>`).join('');
}

/* ── HERO ── */
function renderHero(d) {
  const p = d.personal;
  const parts = (p.name||'').split(' ');
  const last = parts.pop(), first = parts.join(' ');
  const stats = (d.stats||[]).map(s =>
    `<div><div class="stat-num">${esc(s.value)}</div><div class="stat-lbl">${esc(s.label)}</div></div>`
  ).join('');
  el('about').innerHTML = `
    <div class="hero-bg"></div><div class="hero-grid"></div>
    <div class="hero-inner">
      ${p.available?`<div class="hero-badge">${esc(p.availability_text||'Open to opportunities')}</div>`:''}
      <h1 class="hero-name">${esc(first)}<br><span>${esc(last)}</span></h1>
      <p class="hero-sub">${esc(p.title)} &nbsp;·&nbsp; ${esc(p.location)}</p>
      <p class="hero-summary">${esc(d.summary)}</p>
      <div class="hero-stats">${stats}</div>
      <div class="hero-cta">
        <a href="#contact" class="btn-p">Get in Touch</a>
        <a href="#experience" class="btn-s">View Experience</a>
      </div>
    </div>`;
}

/* ── HIGHLIGHTS ── */
function renderHighlights(d) {
  const cards = (d.highlights||[]).map(h =>
    `<div class="hl-card fade"><div class="hl-icon">${h.icon||''}</div><div class="hl-val">${esc(h.value)}</div><div class="hl-lbl">${esc(h.label)}</div></div>`
  ).join('');
  el('highlights').style.background = 'var(--bg-secondary)';
  el('highlights').innerHTML = `<div class="container">
    <div class="s-label fade">Key Impact</div>
    <h2 class="s-title fade">What I Deliver</h2>
    <div class="s-divider fade"></div>
    <div class="hl-grid">${cards}</div></div>`;
}

/* ── EXPERIENCE ── */
function renderExperience(d) {
  const items = (d.experience||[]).map(e => `
    <div class="tl-item fade"><div class="exp-card">
      <div class="exp-head">
        <div><div class="exp-title">${esc(e.title)}</div><div class="exp-co">${esc(e.company)}</div></div>
        <div style="text-align:right"><div class="exp-period">${esc(e.period)}</div><div class="exp-loc">📍 ${esc(e.location)}</div></div>
      </div>
      <ul class="exp-bullets">${(e.bullets||[]).map(b=>`<li>${esc(b)}</li>`).join('')}</ul>
    </div></div>`).join('');
  el('experience').innerHTML = `<div class="container">
    <div class="s-label fade">Career</div>
    <h2 class="s-title fade">Professional Experience</h2>
    <div class="s-divider fade"></div>
    <div class="timeline">${items}</div></div>`;
}

/* ── PROJECT CARD ── */
function projectCard(repo, ov) {
  const status = ov?.status || 'active';
  const icon   = ov?.icon || '📁';
  const desc   = ov?.custom_description || repo.description || 'No description provided.';
  const arch   = ov?.architecture || [];
  const hl     = ov?.highlights || [];
  const tech   = ov?.tech_tags || [];
  const isWip  = status === 'wip';
  const isNew  = !isWip && repo.created_at && (Date.now()-new Date(repo.created_at)) < 14*24*3600*1000;

  const badge = isWip  ? `<span class="badge badge-wip"><span class="badge-dot"></span>In Progress</span>`
              : isNew  ? `<span class="badge badge-new"><span class="badge-dot"></span>New</span>`
                       : `<span class="badge badge-active"><span class="badge-dot"></span>Active</span>`;

  const meta = [
    repo.stargazers_count>0 && `<span>⭐ ${repo.stargazers_count}</span>`,
    repo.forks_count>0      && `<span>🍴 ${repo.forks_count}</span>`,
    repo.language           && `<span>💻 ${esc(repo.language)}</span>`,
  ].filter(Boolean).join('');

  const archHtml = arch.length ? `<div class="proj-arch">
    <div class="proj-section-title">Pipeline Architecture</div>
    <div class="arch-flow">${arch.map((n,i)=>
      `<span class="arch-node">${esc(n)}</span>${i<arch.length-1?'<span class="arch-arrow">→</span>':''}`
    ).join('')}</div></div>` : '';

  const hlHtml = hl.length ? `<div style="margin-bottom:1.1rem">
    <div class="proj-section-title">Key Highlights</div>
    <ul class="proj-hl">${hl.map(h=>`<li>${esc(h)}</li>`).join('')}</ul></div>` : '';

  const langTag = repo.language ? `<span class="tag tag-lang">${esc(repo.language)}</span>` : '';
  const tagsHtml = (tech.length || langTag) ? `<div class="proj-tags">${langTag}${tech.map(t=>`<span class="tag">${esc(t)}</span>`).join('')}</div>` : '';

  const prettyName = repo.name.replace(/-/g,' ').replace(/\b\w/g,c=>c.toUpperCase());

  const body = isWip ? `<div class="wip-body">
    <div class="wip-big">🚧</div>
    <div class="wip-lbl">Coming Soon</div>
    <div class="wip-sub">This project is under active development. Watch on GitHub to get notified when it launches.</div>
  </div>` : `<div class="proj-body">${archHtml}${hlHtml}${tagsHtml}</div>`;

  return `<div class="proj-card fade">
    <div class="proj-head">
      <div class="proj-top">
        <div class="proj-name-row"><span class="proj-icon">${icon}</span><span class="proj-name">${esc(prettyName)}</span></div>
        ${badge}
      </div>
      <p class="proj-desc">${esc(desc)}</p>
      ${meta ? `<div class="proj-meta">${meta}</div>` : ''}
    </div>
    ${body}
    <div class="proj-foot">
      <div class="proj-links">
        <a href="${esc(repo.html_url)}" target="_blank" rel="noopener" class="pl pl-primary">⭐ View on GitHub</a>
        ${repo.homepage ? `<a href="${esc(repo.homepage)}" target="_blank" rel="noopener" class="pl pl-ghost">🔗 Live Demo</a>` : ''}
      </div>
      <span class="proj-updated">${fmt(repo.updated_at)}</span>
    </div>
  </div>`;
}

/* ── PROJECTS ── */
function renderProjects(repos, cfg, username) {
  const excl = new Set(cfg?.exclude_repos||[]);
  const ov   = cfg?.repo_overrides||{};

  let list = repos.filter(r => !excl.has(r.name));
  list.sort((a,b) => {
    const pa = ov[a.name]?.pinned ? (ov[a.name].pin_order||99) : Infinity;
    const pb = ov[b.name]?.pinned ? (ov[b.name].pin_order||99) : Infinity;
    if (pa!==pb) return pa-pb;
    return new Date(b.pushed_at)-new Date(a.pushed_at);
  });

  const cards = list.length
    ? list.map(r => projectCard(r, ov[r.name])).join('')
    : `<div class="proj-empty">No public repositories found. Make sure your GitHub username in data.json is correct.</div>`;

  el('projects').style.background = 'var(--bg-secondary)';
  el('projects').innerHTML = `<div class="container">
    <div class="s-label fade">Open Source</div>
    <h2 class="s-title fade">Featured Projects</h2>
    <div class="s-divider fade"></div>
    <div class="proj-grid">${cards}</div>
    <p style="text-align:center;margin-top:2rem;font-size:.8rem;color:var(--text-3)">
      Auto-synced from <a href="https://github.com/${esc(username)}" target="_blank" rel="noopener"
        style="color:var(--accent);text-decoration:none">GitHub</a> · New repos appear within minutes of a push
    </p></div>`;
}

/* ── SKILLS ── */
function renderSkills(d) {
  const cards = (d.skills||[]).map(sk => `
    <div class="sk-card fade">
      <div class="sk-head"><div class="sk-ico">${sk.icon||'🔧'}</div><div class="sk-cat">${esc(sk.category)}</div></div>
      <div class="sk-tags">${(sk.tags||[]).map(t=>`<span class="sk-tag">${esc(t)}</span>`).join('')}</div>
    </div>`).join('');
  el('skills').innerHTML = `<div class="container">
    <div class="s-label fade">Tech Stack</div>
    <h2 class="s-title fade">Skills &amp; Technologies</h2>
    <div class="s-divider fade"></div>
    <div class="sk-grid">${cards}</div></div>`;
}

/* ── EDUCATION ── */
function renderEducation(d) {
  const cards = (d.education||[]).map(e => `
    <div class="edu-card fade">
      <div class="edu-ico">${e.icon||'🎓'}</div>
      <div>
        <div class="edu-deg">${esc(e.degree)}</div>
        <div class="edu-field">${esc(e.field)}</div>
        <div class="edu-school">${esc(e.school)}</div>
        <div class="edu-period">${esc(e.period)} · ${esc(e.location)}</div>
      </div>
    </div>`).join('');
  el('education').style.background = 'var(--bg-secondary)';
  el('education').innerHTML = `<div class="container">
    <div class="s-label fade">Academic</div>
    <h2 class="s-title fade">Education</h2>
    <div class="s-divider fade"></div>
    <div class="edu-grid">${cards}</div></div>`;
}

/* ── CONTACT ── */
function renderContact(d) {
  const p = d.personal;
  const links = [
    p.email            && {icon:'✉️', href:`mailto:${p.email}`,                                    label:p.email},
    p.linkedin_url     && {icon:'💼', href:p.linkedin_url,    target:'_blank',                      label:p.linkedin_label||p.linkedin_url},
    p.github_username  && {icon:'🐙', href:`https://github.com/${p.github_username}`, target:'_blank', label:`github.com/${p.github_username}`},
    p.phone            && {icon:'📞', href:`tel:${p.phone.replace(/\s/g,'')}`,                     label:p.phone},
  ].filter(Boolean);
  el('contact').innerHTML = `<div class="container">
    <div class="s-label fade" style="text-align:center">Let's Connect</div>
    <h2 class="s-title fade" style="text-align:center">Get In Touch</h2>
    <div class="s-divider fade" style="margin:0 auto 3rem"></div>
    <div class="ct-wrap">
      <p class="ct-intro fade">I'm currently open to Senior Data Engineer roles. Whether you have a question, an opportunity, or just want to say hi — my inbox is always open.</p>
      <div class="ct-links fade">
        ${links.map(l=>`<a class="ct-link" href="${esc(l.href)}"${l.target?` target="${l.target}" rel="noopener"`:''}><div class="ct-icon">${l.icon}</div>${esc(l.label)}</a>`).join('')}
      </div>
    </div></div>`;
}

/* ── FOOTER ── */
function renderFooter(d) {
  const p = d.personal;
  el('footer').innerHTML = `Built with <span>♥</span> &nbsp;·&nbsp; &copy; ${new Date().getFullYear()} ${esc(p.name)} &nbsp;·&nbsp; ${esc(p.location)}<br>
    <span style="font-size:.74rem;color:var(--text-3);display:block;margin-top:4px">
      Content managed via
      <a href="https://github.com/${esc(p.github_username)}/${esc(p.github_username)}.github.io/blob/main/data.json"
         style="color:var(--accent);text-decoration:none" target="_blank" rel="noopener">data.json</a>
      &nbsp;·&nbsp; Projects auto-synced live from GitHub API
    </span>`;
}

/* ── NAV ACTIVE HIGHLIGHT ── */
function setupNav() {
  const sections = document.querySelectorAll('section[id]');
  const links    = document.querySelectorAll('.nav-links a');
  window.addEventListener('scroll', () => {
    let cur = '';
    sections.forEach(s => { if (window.scrollY >= s.offsetTop - 80) cur = s.id; });
    links.forEach(a => a.classList.toggle('active', a.getAttribute('href') === '#'+cur));
  }, {passive:true});
}

/* ── SCROLL ANIMATIONS ── */
function setupAnimations() {
  const obs = new IntersectionObserver(entries => {
    entries.forEach((e,i) => { if(e.isIntersecting){ setTimeout(()=>e.target.classList.add('in'),i*70); obs.unobserve(e.target); } });
  }, {threshold:.07});
  document.querySelectorAll('.fade').forEach(e => obs.observe(e));
}

/* ── MAIN ── */
async function init() {
  try {
    const data  = await loadData();
    const repos = await loadRepos(data.personal.github_username);

    document.title = `${data.personal.name} | ${data.personal.title}`;

    renderNav(data);
    renderHero(data);
    renderHighlights(data);
    renderExperience(data);
    renderProjects(repos, data.projects, data.personal.github_username);
    renderSkills(data);
    renderEducation(data);
    renderContact(data);
    renderFooter(data);

    setupNav();
    setupAnimations();

    el('loader').classList.add('hidden');
  } catch(err) {
    console.error(err);
    el('loader').innerHTML = `
      <div style="text-align:center;color:#8892b0;font-family:Inter,sans-serif;padding:2rem">
        <div style="font-size:2rem;margin-bottom:1rem">⚠️</div>
        <div style="font-size:1rem;margin-bottom:.5rem">Failed to load portfolio</div>
        <div style="font-size:.8rem;color:#4a5568;margin-bottom:1.5rem">${esc(err.message)}</div>
        <button onclick="location.reload()"
          style="padding:8px 20px;background:#00d4c8;border:none;border-radius:6px;color:#0a0e1a;font-weight:600;cursor:pointer;font-size:.85rem">
          Retry
        </button>
      </div>`;
  }
}

init();
</script>
</body>
</html>
